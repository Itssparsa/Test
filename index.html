<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Circuit Diagram Builder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const RotateCw = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        );

        const Trash2 = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const StickyNote = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"></path>
                <path d="M15 3v6h6"></path>
            </svg>
        );

        const CircuitDiagramBuilder = () => {
            const [components, setComponents] = useState([]);
            const [wires, setWires] = useState([]);
            const [selectedComponent, setSelectedComponent] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [isDrawingWire, setIsDrawingWire] = useState(false);
            const [wireStart, setWireStart] = useState(null);
            const [currentWireEnd, setCurrentWireEnd] = useState(null);
            const [showNotes, setShowNotes] = useState(false);
            const [componentValues, setComponentValues] = useState({});
            const [componentCounts, setComponentCounts] = useState({
                R: 0, D: 0, LED: 0, C: 0, Q: 0, V: 0, T: 0, L: 0, SW: 0, GND: 0, OP: 0, OPP: 0, I: 0, E: 0, F: 0
            });
            const [zoom, setZoom] = useState(1);
            const [nodeNames, setNodeNames] = useState({});
            const [isNamingNode, setIsNamingNode] = useState(false);
            
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const gridSize = 20;
            const [canvasSize, setCanvasSize] = useState({ width: 2400, height: 2000 });

            useEffect(() => {
                const updateCanvasSize = () => {
                    const width = window.innerWidth;
                    const height = window.innerHeight - 60;
                    
                    if (width < 768) {
                        setCanvasSize({ width: Math.max(width * 2, 1600), height: Math.max(height * 2, 2000) });
                    } else {
                        setCanvasSize({ width: Math.max(2400, width * 1.5), height: Math.max(1600, height * 1.5) });
                    }
                };

                updateCanvasSize();
                window.addEventListener('resize', updateCanvasSize);
                return () => window.removeEventListener('resize', updateCanvasSize);
            }, []);

            const componentTypes = [
                { type: 'R', name: 'Resistor', unit: 'Ω' },
                { type: 'D', name: 'Diode', unit: '' },
                { type: 'LED', name: 'LED', unit: '' },
                { type: 'C', name: 'Capacitor', unit: 'F' },
                { type: 'Q', name: 'NPN', unit: '' },
                { type: 'Q', name: 'PNP', unit: '', subtype: 'pnp' },
                { type: 'V', name: 'DC Supply', unit: 'V', subtype: 'dc' },
                { type: 'V', name: 'AC Supply', unit: 'V', subtype: 'ac' },
                { type: 'I', name: 'Current Source', unit: 'A' },
                { type: 'E', name: 'Dep Voltage', unit: '' },
                { type: 'F', name: 'Dep Current', unit: '' },
                { type: 'T', name: 'Transformer', unit: '' },
                { type: 'L', name: 'Inductor', unit: 'H' },
                { type: 'SW', name: 'Switch', unit: '' },
                { type: 'GND', name: 'Ground', unit: '' },
                { type: 'OP', name: 'Op-Amp', unit: '' },
                { type: 'OPP', name: 'Op-Amp (Power)', unit: '' }
            ];

            const unitPrefixes = [
                { value: 1e-12, label: 'p' },
                { value: 1e-9, label: 'n' },
                { value: 1e-6, label: 'µ' },
                { value: 1e-3, label: 'm' },
                { value: 1, label: '' },
                { value: 1e3, label: 'k' },
                { value: 1e6, label: 'M' }
            ];

            const snapToGrid = (value) => Math.round(value / gridSize) * gridSize;

            const addComponent = (type, subtype = null) => {
                const count = componentCounts[type] + 1;
                const id = `${type}${count}`;
                
                setComponentCounts(prev => ({ ...prev, [type]: count }));
                
                const newComponent = {
                    id,
                    type,
                    subtype,
                    x: 200,
                    y: 200,
                    rotation: 0,
                    label: id
                };
                
                setComponents([...components, newComponent]);
                
                if (type === 'T') {
                    setComponentValues(prev => ({
                        ...prev,
                        [id]: { primary: '', secondary: '' }
                    }));
                } else if (type === 'E' || type === 'F') {
                    setComponentValues(prev => ({
                        ...prev,
                        [id]: { gain: '' }
                    }));
                } else {
                    setComponentValues(prev => ({
                        ...prev,
                        [id]: { value: '', prefix: 1 }
                    }));
                }
            };

            const drawComponent = (ctx, comp, values) => {
                ctx.save();
                ctx.translate(comp.x, comp.y);
                ctx.rotate((comp.rotation * Math.PI) / 180);
                ctx.strokeStyle = '#000';
                ctx.fillStyle = '#000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const size = 40;

                switch (comp.type) {
                    case 'R':
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-20, 0);
                        ctx.lineTo(-15, -8);
                        ctx.lineTo(-5, 8);
                        ctx.lineTo(5, -8);
                        ctx.lineTo(15, 8);
                        ctx.lineTo(20, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'D':
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-8, 0);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-8, -10);
                        ctx.lineTo(-8, 10);
                        ctx.lineTo(8, 0);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(8, -10);
                        ctx.lineTo(8, 10);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(8, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'LED':
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-8, 0);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-8, -10);
                        ctx.lineTo(-8, 10);
                        ctx.lineTo(8, 0);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(8, -10);
                        ctx.lineTo(8, 10);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(8, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(5, -15);
                        ctx.lineTo(12, -22);
                        ctx.moveTo(10, -20);
                        ctx.lineTo(12, -22);
                        ctx.lineTo(10, -24);
                        ctx.moveTo(10, -15);
                        ctx.lineTo(17, -22);
                        ctx.moveTo(15, -20);
                        ctx.lineTo(17, -22);
                        ctx.lineTo(15, -24);
                        ctx.stroke();
                        ctx.lineWidth = 2;
                        break;

                    case 'C':
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-3, 0);
                        ctx.moveTo(-3, -16);
                        ctx.lineTo(-3, 16);
                        ctx.moveTo(3, -16);
                        ctx.lineTo(3, 16);
                        ctx.moveTo(3, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'Q':
                        ctx.beginPath();
                        ctx.arc(0, 0, 20, 0, 2 * Math.PI);
                        ctx.stroke();
                        
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(-10, -14);
                        ctx.lineTo(-10, 14);
                        ctx.stroke();
                        ctx.lineWidth = 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-10, 0);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-10, -8);
                        ctx.lineTo(8, -20);
                        ctx.lineTo(8, -size);
                        ctx.moveTo(-10, 8);
                        ctx.lineTo(8, 20);
                        ctx.lineTo(8, size);
                        ctx.stroke();
                        break;

                    case 'V':
                        ctx.beginPath();
                        ctx.arc(0, 0, 18, 0, 2 * Math.PI);
                        ctx.stroke();
                        
                        if (comp.subtype === 'ac') {
                            ctx.beginPath();
                            ctx.moveTo(-10, 0);
                            for (let i = -10; i <= 10; i += 1) {
                                ctx.lineTo(i, Math.sin(i / 3) * 8);
                            }
                            ctx.stroke();
                        } else {
                            ctx.font = 'bold 14px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText('+', -8, 3);
                            ctx.fillText('−', 8, 3);
                        }
                        
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-18, 0);
                        ctx.moveTo(18, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'I':
                        ctx.beginPath();
                        ctx.arc(0, 0, 18, 0, 2 * Math.PI);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-18, 0);
                        ctx.moveTo(-10, 0);
                        ctx.lineTo(10, 0);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(10, 0);
                        ctx.lineTo(6, -4);
                        ctx.moveTo(10, 0);
                        ctx.lineTo(6, 4);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(18, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'E': // Dependent Voltage Source - Diamond with + and -
                        ctx.beginPath();
                        ctx.moveTo(-20, 0);
                        ctx.lineTo(0, -20);
                        ctx.lineTo(20, 0);
                        ctx.lineTo(0, 20);
                        ctx.closePath();
                        ctx.stroke();
                        
                        ctx.font = 'bold 14px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('+', -6, 3);
                        ctx.fillText('−', 6, 3);
                        
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-20, 0);
                        ctx.moveTo(20, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'F': // Dependent Current Source - Diamond with arrow
                        ctx.beginPath();
                        ctx.moveTo(-20, 0);
                        ctx.lineTo(0, -20);
                        ctx.lineTo(20, 0);
                        ctx.lineTo(0, 20);
                        ctx.closePath();
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-10, 0);
                        ctx.lineTo(10, 0);
                        ctx.moveTo(10, 0);
                        ctx.lineTo(6, -4);
                        ctx.moveTo(10, 0);
                        ctx.lineTo(6, 4);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-20, 0);
                        ctx.moveTo(20, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'T':
                        ctx.lineWidth = 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(-15, -size);
                        ctx.lineTo(-15, -20);
                        for (let i = 0; i < 4; i++) {
                            ctx.arc(-15, -20 + i * 6 + 3, 3, 0, Math.PI, true);
                        }
                        ctx.lineTo(-15, -20 + 24);
                        ctx.lineTo(-15, size);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(15, -size);
                        ctx.lineTo(15, -20);
                        for (let i = 0; i < 4; i++) {
                            ctx.arc(15, -20 + i * 6 + 3, 3, 0, Math.PI, true);
                        }
                        ctx.lineTo(15, -20 + 24);
                        ctx.lineTo(15, size);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(0, -28);
                        ctx.lineTo(0, 28);
                        ctx.moveTo(3, -28);
                        ctx.lineTo(3, 28);
                        ctx.stroke();
                        break;

                    case 'L':
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-32, 0);
                        
                        for (let i = 0; i < 4; i++) {
                            ctx.arc(-32 + i * 10 + 5, 0, 5, Math.PI, 0, false);
                        }
                        
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'SW':
                        ctx.beginPath();
                        ctx.moveTo(-size, 0);
                        ctx.lineTo(-8, 0);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.arc(-8, 0, 2.5, 0, 2 * Math.PI);
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(-8, 0);
                        ctx.lineTo(8, 10);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.arc(8, 0, 2.5, 0, 2 * Math.PI);
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(8, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        break;

                    case 'GND':
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(0, 0);
                        ctx.stroke();
                        
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(-15, 0);
                        ctx.lineTo(15, 0);
                        ctx.moveTo(-10, 5);
                        ctx.lineTo(10, 5);
                        ctx.moveTo(-5, 10);
                        ctx.lineTo(5, 10);
                        ctx.stroke();
                        ctx.lineWidth = 2;
                        break;

                    case 'OPP':
                    case 'OP':
                        ctx.beginPath();
                        ctx.moveTo(-25, -20);
                        ctx.lineTo(25, 0);
                        ctx.lineTo(-25, 20);
                        ctx.closePath();
                        ctx.stroke();
                        
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(-18, -12);
                        ctx.lineTo(-12, -12);
                        ctx.moveTo(-15, -15);
                        ctx.lineTo(-15, -9);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(-18, 12);
                        ctx.lineTo(-12, 12);
                        ctx.stroke();
                        ctx.lineWidth = 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(-25, -12);
                        ctx.lineTo(-size, -12);
                        ctx.moveTo(-25, 12);
                        ctx.lineTo(-size, 12);
                        ctx.moveTo(25, 0);
                        ctx.lineTo(size, 0);
                        ctx.stroke();
                        
                        if (comp.type === 'OPP') {
                            ctx.beginPath();
                            ctx.moveTo(0, -20);
                            ctx.lineTo(0, -30);
                            ctx.moveTo(0, 20);
                            ctx.lineTo(0, 30);
                            ctx.stroke();
                            
                            ctx.font = '10px Arial';
                            ctx.fillStyle = '#000';
                            ctx.textAlign = 'center';
                            ctx.fillText('V+', 10, -18);
                            ctx.fillText('V-', 10, 28);
                        }
                        break;
                }

                const points = getConnectionPoints(comp);
                ctx.fillStyle = '#ff0000';
                points.forEach(point => {
                    ctx.beginPath();
                    ctx.arc(point.dx, point.dy, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });

                ctx.restore();

                ctx.save();
                ctx.translate(comp.x, comp.y);
                ctx.rotate((comp.rotation * Math.PI) / 180);
                
                ctx.fillStyle = '#0066cc';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                
                if (comp.type === 'Q') {
                    ctx.fillText(comp.label, -25, -25);
                } else if (comp.type === 'GND') {
                    ctx.fillText(comp.label, 0, 25);
                } else if (comp.type === 'OPP') {
                    ctx.fillText(comp.label, -35, -25);
                } else {
                    ctx.fillText(comp.label, 0, -35);
                }
                
                if (comp.type === 'Q') {
                    const transistorType = comp.subtype === 'pnp' ? 'PNP' : 'NPN';
                    ctx.fillStyle = '#cc0000';
                    ctx.font = 'bold 13px Arial';
                    ctx.fillText(transistorType, -25, 35);
                } else if (comp.type === 'T') {
                    const vals = values[comp.id];
                    if (vals && vals.primary && vals.secondary) {
                        const ratioText = `${vals.primary}:${vals.secondary}`;
                        ctx.fillStyle = '#cc0000';
                        ctx.font = 'bold 13px Arial';
                        ctx.fillText(ratioText, 0, 50);
                    }
                } else if (comp.type === 'E' || comp.type === 'F') {
                    const vals = values[comp.id];
                    if (vals && vals.gain) {
                        ctx.fillStyle = '#cc0000';
                        ctx.font = 'bold 13px Arial';
                        ctx.fillText(vals.gain, 0, 38);
                    }
                } else if (values[comp.id]) {
                    const value = values[comp.id].value;
                    const prefix = values[comp.id].prefix;
                    
                    if (value) {
                        let unitSymbol = '';
                        if (comp.type === 'R') unitSymbol = 'Ω';
                        else if (comp.type === 'C') unitSymbol = 'F';
                        else if (comp.type === 'L') unitSymbol = 'H';
                        else if (comp.type === 'I') unitSymbol = 'A';
                        else if (comp.type === 'V') unitSymbol = 'V';
                        
                        const prefixLabel = unitPrefixes.find(p => p.value === prefix)?.label || '';
                        const valueText = `${value} ${prefixLabel}${unitSymbol}`;
                        
                        ctx.fillStyle = '#cc0000';
                        ctx.font = 'bold 13px Arial';
                        ctx.fillText(valueText, 0, 38);
                    }
                }
                
                ctx.restore();
            };

            const getConnectionPoints = (comp) => {
                const size = 40;
                const angle = comp.rotation * Math.PI / 180;
                let points = [];

                switch (comp.type) {
                    case 'Q':
                        points = [
                            { dx: -size * Math.cos(angle), dy: -size * Math.sin(angle), label: 'B' },
                            { dx: 8 * Math.cos(angle) + (-size) * Math.sin(angle), dy: 8 * Math.sin(angle) - (-size) * Math.cos(angle), label: 'C' },
                            { dx: 8 * Math.cos(angle) + size * Math.sin(angle), dy: 8 * Math.sin(angle) - size * Math.cos(angle), label: 'E' }
                        ];
                        break;
                    case 'T':
                        points = [
                            { dx: -15 * Math.cos(angle) + (-size) * Math.sin(angle), dy: -15 * Math.sin(angle) - (-size) * Math.cos(angle), label: 'L1-top' },
                            { dx: -15 * Math.cos(angle) + size * Math.sin(angle), dy: -15 * Math.sin(angle) - size * Math.cos(angle), label: 'L1-bot' },
                            { dx: 15 * Math.cos(angle) + (-size) * Math.sin(angle), dy: 15 * Math.sin(angle) - (-size) * Math.cos(angle), label: 'L2-top' },
                            { dx: 15 * Math.cos(angle) + size * Math.sin(angle), dy: 15 * Math.sin(angle) - size * Math.cos(angle), label: 'L2-bot' }
                        ];
                        break;
                    case 'OPP':
                    case 'OP':
                        if (comp.type === 'OPP') {
                            points = [
                                { dx: -size * Math.cos(angle) + (-12) * Math.sin(angle), dy: -size * Math.sin(angle) - (-12) * Math.cos(angle), label: '+' },
                                { dx: -size * Math.cos(angle) + 12 * Math.sin(angle), dy: -size * Math.sin(angle) - 12 * Math.cos(angle), label: '-' },
                                { dx: size * Math.cos(angle), dy: size * Math.sin(angle), label: 'out' },
                                { dx: 0 * Math.cos(angle) + (-30) * Math.sin(angle), dy: 0 * Math.sin(angle) - (-30) * Math.cos(angle), label: 'V+' },
                                { dx: 0 * Math.cos(angle) + 30 * Math.sin(angle), dy: 0 * Math.sin(angle) - 30 * Math.cos(angle), label: 'V-' }
                            ];
                        } else {
                            points = [
                                { dx: -size * Math.cos(angle) + (-12) * Math.sin(angle), dy: -size * Math.sin(angle) - (-12) * Math.cos(angle), label: '+' },
                                { dx: -size * Math.cos(angle) + 12 * Math.sin(angle), dy: -size * Math.sin(angle) - 12 * Math.cos(angle), label: '-' },
                                { dx: size * Math.cos(angle), dy: size * Math.sin(angle), label: 'out' }
                            ];
                        }
                        break;
                    case 'GND':
                        points = [{ dx: 0 * Math.cos(angle) + (-size) * Math.sin(angle), dy: 0 * Math.sin(angle) - (-size) * Math.cos(angle), label: 'top' }];
                        break;
                    default:
                        points = [
                            { dx: -size * Math.cos(angle), dy: -size * Math.sin(angle), label: 'left' },
                            { dx: size * Math.cos(angle), dy: size * Math.sin(angle), label: 'right' }
                        ];
                }

                return points.map(p => ({ x: comp.x + p.dx, y: comp.y + p.dy, dx: p.dx, dy: p.dy, label: p.label }));
            };

            const handleCanvasMouseDown = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = (e.clientX - rect.left) / zoom;
                const y = (e.clientY - rect.top) / zoom;

                // If in naming mode, name the clicked node
                if (isNamingNode) {
                    for (const comp of components) {
                        const points = getConnectionPoints(comp);
                        for (const point of points) {
                            const dx = x - point.x;
                            const dy = y - point.y;
                            if (Math.sqrt(dx * dx + dy * dy) < 15) {
                                const nodeName = prompt('Enter node name (e.g., A, B, Vin, Vout):', nodeNames[`${point.x},${point.y}`] || '');
                                if (nodeName !== null) {
                                    if (nodeName.trim() === '') {
                                        const newNodeNames = { ...nodeNames };
                                        delete newNodeNames[`${point.x},${point.y}`];
                                        setNodeNames(newNodeNames);
                                    } else {
                                        setNodeNames(prev => ({
                                            ...prev,
                                            [`${point.x},${point.y}`]: nodeName.trim()
                                        }));
                                    }
                                }
                                setIsNamingNode(false);
                                return;
                            }
                        }
                    }
                    setIsNamingNode(false);
                    return;
                }

                const clickedComp = components.find(comp => {
                    const dx = x - comp.x;
                    const dy = y - comp.y;
                    return Math.sqrt(dx * dx + dy * dy) < 30;
                });

                if (clickedComp) {
                    setSelectedComponent(clickedComp.id);
                    setIsDragging(true);
                    return;
                }

                setSelectedComponent(null);

                // ONLY allow wire drawing from component pins
                const snapDistance = 15;
                for (const comp of components) {
                    const points = getConnectionPoints(comp);
                    for (const point of points) {
                        const dx = x - point.x;
                        const dy = y - point.y;
                        if (Math.sqrt(dx * dx + dy * dy) < snapDistance) {
                            setIsDrawingWire(true);
                            setWireStart({ x: point.x, y: point.y, compId: comp.id });
                            setCurrentWireEnd({ x: point.x, y: point.y });
                            return;
                        }
                    }
                }

                // If we get here, clicking on empty space - do nothing (no wire drawing from empty space)
            };

  const handleCanvasMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / zoom;
    const y = (e.clientY - rect.top) / zoom;

    if (isDragging && selectedComponent) {
      const newX = snapToGrid(x);
      const newY = snapToGrid(y);
      
      setComponents(components.map(comp => {
        if (comp.id === selectedComponent) {
          return { ...comp, x: newX, y: newY };
        }
        return comp;
      }));
      
      // Update wire positions that are connected to this component
      setWires(wires.map(wire => {
        const updatedWire = { ...wire };
        if (wire.start.compId === selectedComponent || wire.end.compId === selectedComponent) {
          // Recalculate connection points for this component
          const movedComp = components.find(c => c.id === selectedComponent);
          if (movedComp) {
            const tempComp = { ...movedComp, x: newX, y: newY };
            const points = getConnectionPoints(tempComp);
            
            if (wire.start.compId === selectedComponent) {
              const matchPoint = points.find(p => 
                Math.abs(p.x - wire.start.x) < 5 && Math.abs(p.y - wire.start.y) < 5
              );
              if (matchPoint) {
                updatedWire.start = { ...wire.start, x: matchPoint.x, y: matchPoint.y };
              }
            }
            
            if (wire.end.compId === selectedComponent) {
              const matchPoint = points.find(p => 
                Math.abs(p.x - wire.end.x) < 5 && Math.abs(p.y - wire.end.y) < 5
              );
              if (matchPoint) {
                updatedWire.end = { ...wire.end, x: matchPoint.x, y: matchPoint.y };
              }
            }
          }
        }
        return updatedWire;
      }));
    }

    if (isDrawingWire) {
      // Magnetic snapping - check if near any connection point
      let snappedEnd = { x, y };
      const snapDistance = 15;
      
      for (const comp of components) {
        const points = getConnectionPoints(comp);
        for (const point of points) {
          const dx = x - point.x;
          const dy = y - point.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < snapDistance) {
            snappedEnd = { x: point.x, y: point.y };
            break;
          }
        }
        if (snappedEnd.x !== x || snappedEnd.y !== y) break;
      }
      
      setCurrentWireEnd(snappedEnd);
    }
  };

            const handleCanvasMouseUp = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const x = (e.clientX - rect.left) / zoom;
                const y = (e.clientY - rect.top) / zoom;

                if (isDrawingWire && wireStart) {
                    let endPoint = { x: snapToGrid(x), y: snapToGrid(y), compId: null };
                    const snapDistance = 15;

                    // Magnetic snapping for wire end
                    for (const comp of components) {
                        const points = getConnectionPoints(comp);
                        for (const point of points) {
                            const dx = x - point.x;
                            const dy = y - point.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < snapDistance) {
                                endPoint = { x: point.x, y: point.y, compId: comp.id };
                                break;
                            }
                        }
                        if (endPoint.compId) break;
                    }

                    setWires([...wires, { start: wireStart, end: endPoint }]);
                    setIsDrawingWire(false);
                    setWireStart(null);
                    setCurrentWireEnd(null);
                }

                setIsDragging(false);
            };

  const rotateComponent = () => {
    if (selectedComponent) {
      setComponents(components.map(comp => {
        if (comp.id === selectedComponent) {
          const newRotation = (comp.rotation + 90) % 360;
          return { ...comp, rotation: newRotation };
        }
        return comp;
      }));
      
      // Update wire positions connected to this component
      const rotatedComp = components.find(c => c.id === selectedComponent);
      if (rotatedComp) {
        const newRotation = (rotatedComp.rotation + 90) % 360;
        const tempComp = { ...rotatedComp, rotation: newRotation };
        const newPoints = getConnectionPoints(tempComp);
        const oldPoints = getConnectionPoints(rotatedComp);
        
        setWires(wires.map(wire => {
          let updatedWire = { ...wire };
          
          if (wire.start.compId === selectedComponent) {
            // Find which old point this was connected to and update to new rotated position
            const oldIndex = oldPoints.findIndex(p => 
              Math.abs(p.x - wire.start.x) < 1 && Math.abs(p.y - wire.start.y) < 1
            );
            if (oldIndex >= 0 && newPoints[oldIndex]) {
              updatedWire.start = { ...wire.start, x: newPoints[oldIndex].x, y: newPoints[oldIndex].y };
            }
          }
          
          if (wire.end.compId === selectedComponent) {
            const oldIndex = oldPoints.findIndex(p => 
              Math.abs(p.x - wire.end.x) < 1 && Math.abs(p.y - wire.end.y) < 1
            );
            if (oldIndex >= 0 && newPoints[oldIndex]) {
              updatedWire.end = { ...wire.end, x: newPoints[oldIndex].x, y: newPoints[oldIndex].y };
            }
          }
          
          return updatedWire;
        }));
      }
    }
  };

            const deleteSelected = () => {
                if (selectedComponent) {
                    setComponents(components.filter(comp => comp.id !== selectedComponent));
                    setWires(wires.filter(wire => 
                        wire.start.compId !== selectedComponent && wire.end.compId !== selectedComponent
                    ));
                    setSelectedComponent(null);
                }
            };

            const undoLastAction = () => {
                if (wires.length > 0) {
                    setWires(wires.slice(0, -1));
                } else if (components.length > 0) {
                    const lastComp = components[components.length - 1];
                    setComponents(components.slice(0, -1));
                    
                    setComponentCounts(prev => ({
                        ...prev,
                        [lastComp.type]: Math.max(0, prev[lastComp.type] - 1)
                    }));
                    
                    const newValues = { ...componentValues };
                    delete newValues[lastComp.id];
                    setComponentValues(newValues);
                }
            };

            const zoomIn = () => setZoom(prev => Math.min(prev + 0.1, 2));
            const zoomOut = () => setZoom(prev => Math.max(prev - 0.1, 0.5));
            const resetZoom = () => setZoom(1);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#f0f0f0';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                wires.forEach(wire => {
                    ctx.beginPath();
                    ctx.moveTo(wire.start.x, wire.start.y);
                    ctx.lineTo(wire.end.x, wire.end.y);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(wire.start.x, wire.start.y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(wire.end.x, wire.end.y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });

                if (isDrawingWire && wireStart && currentWireEnd) {
                    ctx.strokeStyle = '#666';
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(wireStart.x, wireStart.y);
                    ctx.lineTo(currentWireEnd.x, currentWireEnd.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                components.forEach(comp => {
                    if (comp.id === selectedComponent) {
                        ctx.save();
                        ctx.strokeStyle = '#0066cc';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.strokeRect(comp.x - 35, comp.y - 35, 70, 70);
                        ctx.setLineDash([]);
                        ctx.restore();
                    }
                    drawComponent(ctx, comp, componentValues);
                });

                ctx.fillStyle = '#009900';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                Object.entries(nodeNames).forEach(([coords, name]) => {
                    const [x, y] = coords.split(',').map(Number);
                    ctx.fillText(name, x, y - 8);
                });
            }, [components, wires, selectedComponent, isDrawingWire, wireStart, currentWireEnd, componentValues, canvasSize, nodeNames]);

            return (
                <div style={{ width: '100%', height: '100vh', backgroundColor: '#f9fafb', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                    <div style={{ backgroundColor: 'white', borderBottom: '1px solid #e5e7eb', padding: '8px', overflowX: 'auto' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', minWidth: 'max-content', paddingBottom: '4px' }}>
                            <div style={{ fontWeight: '600', color: '#374151', fontSize: '12px', marginRight: '8px', whiteSpace: 'nowrap' }}>Components:</div>
                            {componentTypes.map((comp, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => addComponent(comp.type, comp.subtype)}
                                    style={{ padding: '6px 8px', backgroundColor: '#3b82f6', color: 'white', fontSize: '12px', borderRadius: '4px', border: 'none', whiteSpace: 'nowrap', flexShrink: 0, cursor: 'pointer' }}
                                >
                                    {comp.name}
                                </button>
                            ))}
                            
                            <div style={{ marginLeft: '8px', display: 'flex', gap: '6px', borderLeft: '1px solid #d1d5db', paddingLeft: '8px' }}>
                                <button
                                    onClick={undoLastAction}
                                    style={{ padding: '6px 8px', backgroundColor: '#f97316', color: 'white', fontSize: '12px', borderRadius: '4px', border: 'none', whiteSpace: 'nowrap', cursor: 'pointer' }}
                                >
                                    Undo
                                </button>
                                <button
                                    onClick={rotateComponent}
                                    disabled={!selectedComponent}
                                    style={{ padding: '6px', backgroundColor: '#e5e7eb', borderRadius: '4px', border: 'none', opacity: selectedComponent ? 1 : 0.5, cursor: selectedComponent ? 'pointer' : 'not-allowed' }}
                                >
                                    <RotateCw size={16} />
                                </button>
                                <button
                                    onClick={deleteSelected}
                                    disabled={!selectedComponent}
                                    style={{ padding: '6px', backgroundColor: '#ef4444', color: 'white', borderRadius: '4px', border: 'none', opacity: selectedComponent ? 1 : 0.5, cursor: selectedComponent ? 'pointer' : 'not-allowed' }}
                                >
                                    <Trash2 size={16} />
                                </button>
                                <button
                                    onClick={() => setIsNamingNode(!isNamingNode)}
                                    style={{ padding: '6px 8px', backgroundColor: isNamingNode ? '#10b981' : '#6b7280', color: 'white', fontSize: '12px', borderRadius: '4px', border: 'none', cursor: 'pointer', whiteSpace: 'nowrap' }}
                                    title="Name Node"
                                >
                                    {isNamingNode ? '✓ Name' : 'Name'}
                                </button>
                            </div>
                            
                            <div style={{ marginLeft: '8px', display: 'flex', gap: '6px', alignItems: 'center', borderLeft: '1px solid #d1d5db', paddingLeft: '8px' }}>
                                <button onClick={zoomOut} style={{ padding: '4px 10px', backgroundColor: '#4b5563', color: 'white', fontSize: '16px', fontWeight: 'bold', borderRadius: '4px', border: 'none', cursor: 'pointer', lineHeight: '1' }}>−</button>
                                <span style={{ fontSize: '12px', fontWeight: '600', minWidth: '45px', textAlign: 'center' }}>{Math.round(zoom * 100)}%</span>
                                <button onClick={zoomIn} style={{ padding: '4px 10px', backgroundColor: '#4b5563', color: 'white', fontSize: '16px', fontWeight: 'bold', borderRadius: '4px', border: 'none', cursor: 'pointer', lineHeight: '1' }}>+</button>
                                <button onClick={resetZoom} style={{ padding: '6px 8px', backgroundColor: '#4b5563', color: 'white', fontSize: '12px', borderRadius: '4px', border: 'none', cursor: 'pointer', whiteSpace: 'nowrap' }}>100%</button>
                            </div>
                        </div>
                    </div>

                    <div ref={containerRef} style={{ flex: 1, position: 'relative', overflow: 'auto' }}>
                        <div style={{ transform: `scale(${zoom})`, transformOrigin: 'top left', display: 'inline-block' }}>
                            <canvas
                                ref={canvasRef}
                                width={canvasSize.width}
                                height={canvasSize.height}
                                onMouseDown={handleCanvasMouseDown}
                                onMouseMove={handleCanvasMouseMove}
                                onMouseUp={handleCanvasMouseUp}
                                onTouchStart={(e) => {
                                    e.preventDefault();
                                    const touch = e.touches[0];
                                    handleCanvasMouseDown({ clientX: touch.clientX, clientY: touch.clientY, detail: 1 });
                                }}
                                onTouchMove={(e) => {
                                    e.preventDefault();
                                    const touch = e.touches[0];
                                    handleCanvasMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
                                }}
                                onTouchEnd={(e) => {
                                    e.preventDefault();
                                    handleCanvasMouseUp({ clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY });
                                }}
                                style={{ cursor: 'crosshair', touchAction: 'none', backgroundColor: 'white' }}
                            />
                        </div>
                    </div>

                    <div style={{ position: 'fixed', bottom: '8px', right: '8px', backgroundColor: '#fef3c7', border: '2px solid #fcd34d', borderRadius: '8px', boxShadow: '0 10px 15px rgba(0,0,0,0.1)', transition: 'all 0.3s', width: showNotes ? 'calc(91.666667% - 16px)' : '40px', maxWidth: showNotes ? '24rem' : '40px', zIndex: 50 }}>
                        <div 
                            onClick={() => setShowNotes(!showNotes)}
                            style={{ backgroundColor: '#fde68a', padding: '8px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderRadius: '6px 6px 0 0' }}
                        >
                            <StickyNote size={16} />
                            {showNotes && <span style={{ fontWeight: '600', fontSize: '14px' }}>Values</span>}
                        </div>
                        
                        {showNotes && (
                            <div style={{ padding: '8px', maxHeight: '256px', overflowY: 'auto' }}>
                                {components.map(comp => {
                                    if (comp.type === 'Q') {
                                        return (
                                            <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                                <div style={{ fontWeight: '600', fontSize: '12px' }}>{comp.label} - {comp.subtype === 'pnp' ? 'PNP' : 'NPN'}</div>
                                            </div>
                                        );
                                    }
                                    
                                    if (comp.type === 'GND' || comp.type === 'SW' || comp.type === 'OP' || comp.type === 'OPP' || comp.type === 'D' || comp.type === 'LED') {
                                        return (
                                            <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                                <div style={{ fontWeight: '600', fontSize: '12px' }}>{comp.label}</div>
                                            </div>
                                        );
                                    }
                                    
                                    if (comp.type === 'T') {
                                        return (
                                            <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                                <div style={{ fontWeight: '600', fontSize: '12px', marginBottom: '4px' }}>{comp.label}</div>
                                                <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                                                    <input
                                                        type="text"
                                                        placeholder="Pri"
                                                        value={componentValues[comp.id]?.primary || ''}
                                                        onChange={(e) => setComponentValues(prev => ({
                                                            ...prev,
                                                            [comp.id]: { ...prev[comp.id], primary: e.target.value }
                                                        }))}
                                                        style={{ width: '56px', padding: '4px', fontSize: '12px', border: '1px solid #d1d5db', borderRadius: '4px' }}
                                                    />
                                                    <span style={{ fontSize: '12px', fontWeight: '600' }}>:</span>
                                                    <input
                                                        type="text"
                                                        placeholder="Sec"
                                                        value={componentValues[comp.id]?.secondary || ''}
                                                        onChange={(e) => setComponentValues(prev => ({
                                                            ...prev,
                                                            [comp.id]: { ...prev[comp.id], secondary: e.target.value }
                                                        }))}
                                                        style={{ width: '56px', padding: '4px', fontSize: '12px', border: '1px solid #d1d5db', borderRadius: '4px' }}
                                                    />
                                                </div>
                                            </div>
                                        );
                                    }
                                    
                                    if (comp.type === 'E' || comp.type === 'F') {
                                        return (
                                            <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                                <div style={{ fontWeight: '600', fontSize: '12px', marginBottom: '4px' }}>{comp.label}</div>
                                                <input
                                                    type="text"
                                                    placeholder="Gain"
                                                    value={componentValues[comp.id]?.gain || ''}
                                                    onChange={(e) => setComponentValues(prev => ({
                                                        ...prev,
                                                        [comp.id]: { ...prev[comp.id], gain: e.target.value }
                                                    }))}
                                                    style={{ width: '100%', padding: '4px', fontSize: '12px', border: '1px solid #d1d5db', borderRadius: '4px' }}
                                                />
                                            </div>
                                        );
                                    }
                                    
                                    const needsUnitPrefix = ['R', 'C', 'L', 'I'].includes(comp.type) || 
                                                           (comp.type === 'V' && (comp.subtype === 'dc' || comp.subtype === 'ac'));
                                    
                                    if (!needsUnitPrefix) {
                                        return (
                                            <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                                <div style={{ fontWeight: '600', fontSize: '12px' }}>{comp.label}</div>
                                            </div>
                                        );
                                    }
                                    
                                    let unitSymbol = '';
                                    if (comp.type === 'R') unitSymbol = 'Ω';
                                    else if (comp.type === 'C') unitSymbol = 'F';
                                    else if (comp.type === 'L') unitSymbol = 'H';
                                    else if (comp.type === 'I') unitSymbol = 'A';
                                    else if (comp.type === 'V') unitSymbol = 'V';
                                    
                                    return (
                                        <div key={comp.id} style={{ marginBottom: '8px', paddingBottom: '8px', borderBottom: '1px solid #fcd34d' }}>
                                            <div style={{ fontWeight: '600', fontSize: '12px', marginBottom: '4px' }}>{comp.label}</div>
                                            <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                                                <input
                                                    type="text"
                                                    placeholder="Value"
                                                    value={componentValues[comp.id]?.value || ''}
                                                    onChange={(e) => setComponentValues(prev => ({
                                                        ...prev,
                                                        [comp.id]: { ...prev[comp.id], value: e.target.value }
                                                    }))}
                                                    style={{ flex: 1, padding: '4px', fontSize: '12px', border: '1px solid #d1d5db', borderRadius: '4px' }}
                                                />
                                                <select
                                                    value={componentValues[comp.id]?.prefix || 1}
                                                    onChange={(e) => setComponentValues(prev => ({
                                                        ...prev,
                                                        [comp.id]: { ...prev[comp.id], prefix: parseFloat(e.target.value) }
                                                    }))}
                                                    style={{ padding: '4px', fontSize: '12px', border: '1px solid #d1d5db', borderRadius: '4px', width: '48px' }}
                                                >
                                                    {unitPrefixes.map(prefix => (
                                                        <option key={prefix.value} value={prefix.value}>
                                                            {prefix.label}{unitSymbol}
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CircuitDiagramBuilder />);
    </script>
</body>
</html>
